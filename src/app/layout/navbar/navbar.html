<header class="navbar">
  <div class="breadcrumb">

    <mat-icon class="chevron">chevron_right</mat-icon>
    <span class="current">{{ breadcrumb() }}</span>
  </div>

  <div class="search-box">
    <mat-icon>search</mat-icon>
    <input type="text" placeholder="Search assets, users…" />

  <div class="actions">
